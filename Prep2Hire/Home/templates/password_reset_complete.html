<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Password Reset Complete — HirePilot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      padding: 3rem;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 440px;
      text-align: center;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand h1 { font-size: 1.9rem; font-weight: 800; color: #1e40af; letter-spacing: -0.5px; margin-bottom: 1rem; }
    p { font-size: 0.95rem; color: #374151; line-height: 1.6; margin-bottom: 1.5rem; }
    a.btn { display: inline-block; width: 100%; padding: 13px; background: linear-gradient(135deg, #1e40af, #2563eb); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 700; text-decoration: none; cursor: pointer; transition: opacity 0.2s, transform 0.15s; box-shadow: 0 6px 18px rgba(37,99,235,0.35); margin-top: 0.4rem; }
    a.btn:hover { opacity: 0.92; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <h1>✅ Success!</h1>
    </div>
    <p>Your password has been set. You may go ahead and log in now.</p>
    <a href="{% url 'login' %}" class="btn">Log In</a>
  </div>
</body>
</html>
