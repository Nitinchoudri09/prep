<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Change Password — Prep2Hire</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      padding: 2.8rem 3rem;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .brand h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #1e40af;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 0.88rem;
      color: #64748b;
      margin-top: 4px;
    }

    /* ── Error / Help text ── */
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      color: #dc2626;
      font-size: 0.87rem;
      font-weight: 500;
    }

    /* Django renders form.as_p — style each p cleanly */
    form p {
      margin-bottom: 1.2rem;
    }

    form p label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    form p input[type="text"],
    form p input[type="password"],
    form p input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 9px;
      border: 1.5px solid #d1d5db;
      background: #f8fafc;
      color: #1e293b;
      font-size: 0.97rem;
      font-family: inherit;
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
    }

    form p input:focus {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* help_text */
    form p .helptext,
    form p small {
      display: block;
      font-size: 0.77rem;
      color: #94a3b8;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* field-level errors */
    form p .errorlist {
      list-style: none;
      padding: 0;
      margin: 5px 0 0;
    }

    form p .errorlist li {
      font-size: 0.82rem;
      color: #dc2626;
      background: #fef2f2;
      border-radius: 5px;
      padding: 4px 8px;
      margin-top: 3px;
    }

    /* ── Submit button ── */
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 6px 18px rgba(37,99,235,0.35);
      margin-top: 0.4rem;
    }

    button[type="submit"]:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    button[type="submit"]:active { transform: translateY(0); }

    /* ── Footer links ── */
    .footer-links {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.88rem;
      color: #64748b;
    }

    .footer-links a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <h1>⚡ Prep2Hire</h1>
      <p>Change your password</p>
    </div>

    <!-- Non-field errors -->
    {% if form.non_field_errors %}
    <div class="alert-error">
      {% for error in form.non_field_errors %}{{ error }}<br>{% endfor %}
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit">Change Password →</button>
    </form>

    <div class="footer-links">
      <a href="{% url 'dashboard' %}">← Back to Dashboard</a>
    </div>
  </div>

</body>
</html>
