<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Prep2Hire</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      padding: 2.8rem 3rem;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }

    .brand h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #1e40af;
      letter-spacing: -0.5px;
    }

    .brand p {
      font-size: 0.88rem;
      color: #64748b;
      margin-top: 4px;
    }

    /* ── Error Alert ── */
    .alert-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      color: #dc2626;
      font-size: 0.87rem;
      font-weight: 500;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    /* ── Field labels ── */
    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 9px;
      border: 1.5px solid #d1d5db;
      background: #f8fafc;
      color: #1e293b;
      font-size: 0.97rem;
      font-family: inherit;
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
    }

    .field input:focus {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* ── Submit button ── */
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 6px 18px rgba(37,99,235,0.35);
      margin-top: 0.4rem;
    }

    button[type="submit"]:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    button[type="submit"]:active { transform: translateY(0); }

    /* ── Footer links ── */
    .footer-links {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.88rem;
      color: #64748b;
    }

    .footer-links a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="card">
    <div class="brand">
      <h1>⚡ Prep2Hire</h1>
      <p>Welcome back! Log in to your account</p>
    </div>

    <!-- Show login errors -->
    {% if form.errors %}
    <div class="alert-error">
      <span>⚠</span>
      <div>
        {% for field in form %}
          {% for error in field.errors %}{{ error }}<br>{% endfor %}
        {% endfor %}
        {% for error in form.non_field_errors %}{{ error }}<br>{% endfor %}
      </div>
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <!-- Preserve the 'next' redirect so @login_required pages work -->
      <input type="hidden" name="next" value="{{ next }}" />

      <div class="field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username"
               value="{{ form.username.value|default:'' }}"
               autocomplete="username" placeholder="Enter your username" />
      </div>

      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password"
               autocomplete="current-password" placeholder="Enter your password" />
      </div>

      <button type="submit" id="btn-login">Log In →</button>
    </form>

    <div class="footer-links">
      Don't have an account? <a href="{% url 'signup' %}">Sign up free</a>
    </div>
  </div>

</body>
</html>
